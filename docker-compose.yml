version: '3.8'

services:
  backend:
    build: .
    container_name: inventorypilot-backend
    command: python -m uvicorn backend:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    networks:
      - inventorypilot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build: .
    container_name: inventorypilot-dashboard
    command: streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    networks:
      - inventorypilot-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  inventorypilot-network:
    driver: bridge

volumes:
  inventorypilot-data:
  inventorypilot-models:
